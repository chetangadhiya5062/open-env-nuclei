spec_version: 1
name: data-cleaner-rl

type: space
runtime: fastapi
app: server.app:app
port: 8000

entry_point: server.data_cleaning_env_environment:DataCleaningEnvironment

tasks:
  - id: easy-clean
    difficulty: easy
    description: Dataset with only missing values in one column

  - id: medium-clean
    difficulty: medium
    description: Dataset with missing values and duplicate rows

  - id: hard-clean
    difficulty: hard
    description: Dataset with missing values, duplicates, and inconsistent categorical values